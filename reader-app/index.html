<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novela Reader</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;600&family=Lora:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;700&family=Open+Dyslexic&display=swap"
        rel="stylesheet">
</head>

<body class="theme-dark">
    <div id="app">
        <!-- Header -->
        <header id="main-header" class="ui-element hidden">
            <div class="header-top">
                <div class="title-container">
                    <h1 id="novel-title">Tribulation of Myriad Races</h1>
                    <p id="chapter-title">Cargando...</p>
                </div>
                <button id="btn-settings" class="settings-icon-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12c0,0.31,0.02,0.65,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                    </svg>
                </button>
            </div>

            <nav class="nav-controls-header">
                <button id="prev-chapter" class="nav-arrow-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                    </svg>
                </button>
                <div class="select-wrapper">
                    <select id="chapter-select">
                        <option value="">Cargando capítulos...</option>
                    </select>
                </div>
                <button id="next-chapter" class="nav-arrow-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                    </svg>
                </button>
            </nav>
        </header>

        <!-- Reader Area -->
        <main id="reader-container">
            <div id="content" class="chapter-content">
                <!-- Content injected here -->
            </div>

            <!-- Bottom Nav -->
            <div id="bottom-nav" class="ui-element hidden">
                <div class="bottom-nav-content">
                    <button id="prev-chapter-bottom" class="icon-btn-bottom">⏮</button>
                    <button id="next-chapter-bottom" class="icon-btn-bottom">⏭</button>
                </div>
            </div>
        </main>

        <!-- Settings Modal (Refined to match screenshot) -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-chapter-title">Configuración</h2>
                    <button id="close-settings" class="close-btn">&times;</button>
                </div>

                <div class="setting-group">
                    <div class="font-options">
                        <button class="font-btn active" data-font="Inter">Default</button>
                        <button class="font-btn" data-font="Open Dyslexic">Dyslexic</button>
                        <button class="font-btn" data-font="Roboto">Roboto</button>
                        <button class="font-btn" data-font="Lora">Lora</button>
                    </div>
                </div>

                <div class="setting-group">
                    <div class="slider-header">
                        <span class="slider-icon">A<sup>-</sup></span>
                        <div class="slider-labels">
                            <span>14</span><span>16</span><span>18</span><span>20</span><span>22</span><span>24</span><span>26</span><span>28</span>
                        </div>
                        <span class="slider-icon">A<sup>+</sup></span>
                    </div>
                    <input type="range" id="font-size-slider" min="14" max="28" value="18" step="2">
                </div>

                <div class="setting-group">
                    <div class="label-row">
                        <span>Line Spacing</span>
                        <span id="line-height-val" class="val-display">1.6</span>
                    </div>
                    <input type="range" id="line-height-slider" min="1.0" max="2.4" value="1.6" step="0.1">
                </div>

                <div class="setting-group">
                    <div class="label-row">
                        <span>Paragraph Spacing</span>
                        <span id="para-spacing-val" class="val-display">1.5em</span>
                    </div>
                    <input type="range" id="para-spacing-slider" min="0.5" max="3.0" value="1.5" step="0.1">
                </div>

                <div class="setting-group">
                    <label class="section-label">Auto Scroll</label>
                    <button id="toggle-autoscroll" class="start-scroll-btn">
                        <span class="play-icon">▶</span> Start Auto Scroll
                    </button>
                    <div class="label-row margin-top">
                        <span>Speed</span>
                        <span id="scroll-speed-val" class="val-display">5</span>
                    </div>
                    <input type="range" id="scroll-speed-slider" min="1" max="10" value="5">
                </div>

                <div class="setting-group">
                    <div class="label-row toggle-row">
                        <span>Ad-Free Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="ad-free-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-status">Off</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tap Zones -->
        <div id="tap-overlay"></div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
